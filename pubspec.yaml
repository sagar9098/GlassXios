name: glassx_ios
description: >
  A production-ready Flutter package providing native-powered iOS Liquid Glass UI
  (UIVisualEffectView via PlatformView) with adaptive BackdropFilter fallback on
  Android and Web. Write once, get stunning glass UI everywhere.
version: 1.0.0
homepage: https://github.com/your-org/glassx_ios
repository: https://github.com/your-org/glassx_ios
issue_tracker: https://github.com/your-org/glassx_ios/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: GlassXPlugin
        swift: true
      android:
        pluginClass: GlassXPlugin
        package: io.glassx.glassx_ios
      web:
        pluginClass: GlassXWebPlugin
        fileName: glassx_ios_web.dart
